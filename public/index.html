<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayden - Assistente Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars"></div>
    <button id="settingsBtn" class="settings-btn" title="Configurações">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <!-- Modal de Login -->
    <div id="loginModal" class="modal show" style="z-index: 1000;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Login Ayden</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="loginEmail">E-mail</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" placeholder="Senha">
                </div>
                <div id="loginFeedback" class="settings-feedback"></div>
                <button id="loginBtn" class="save-btn">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Configurações -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurações de IA</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="groqKey">Groq API Key (Transcrição)</label>
                    <input type="password" id="groqKey" placeholder="gsk_...">
                </div>
                <div class="form-group">
                    <label for="geminiKey">Gemini API Key (Cérebro)</label>
                    <input type="password" id="geminiKey" placeholder="AIza...">
                </div>
                <div id="settingsFeedback" class="settings-feedback"></div>
                <button id="saveSettingsBtn" class="save-btn">Salvar Chaves</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Ayden</h1>
            <p>Assistente Residencial</p>
        </div>

        <div class="orb-container">
            <div id="orb" class="energy-orb listening"></div>
            <div id="statusText" class="status-text">Iniciando sistemas...</div>
        </div>

        <div class="log-container">
            <p id="responseText" class="response-text"></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
